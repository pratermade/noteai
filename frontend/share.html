<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saving…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f9fafb;
      color: #111827;
      text-align: center;
      padding: 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p  { color: #6b7280; font-size: 14px; }
    a  { color: #4f46e5; }
    #error { display: none; }

    /* Image pending UI */
    #image-pending { display: none; width: 100%; max-width: 480px; }
    #image-preview {
      width: 100%; max-height: 300px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 20px;
      background: #e5e7eb;
    }
    .btn-row {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #note-search { display: none; width: 100%; text-align: left; }
    #note-search-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      margin-bottom: 8px;
      outline: none;
    }
    #note-search-input:focus { border-color: #4f46e5; }
    #note-search-results { max-height: 260px; overflow-y: auto; }
    .note-result {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      border-bottom: 1px solid #f3f4f6;
    }
    .note-result:hover { background: #f3f4f6; }
    .note-result-empty { padding: 10px 12px; color: #9ca3af; font-size: 14px; }
    #attach-status { font-size: 14px; color: #6b7280; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Saving your note…</h2>
    <p>This will only take a moment.</p>
  </div>
  <div id="error">
    <h2>Something went wrong</h2>
    <p>Check the <a href="/">main app</a> — your note may still have been saved.</p>
  </div>
  <div id="image-pending">
    <img id="image-preview" alt="Shared image" />
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-new-note">New Note</button>
      <button class="btn btn-secondary" id="btn-attach">Attach to Note</button>
    </div>
    <div id="note-search">
      <input id="note-search-input" type="search" placeholder="Search notes…" autocomplete="off" />
      <div id="note-search-results"></div>
    </div>
    <div id="attach-status"></div>
  </div>
  <script src="/share.js"></script>
</body>
</html>

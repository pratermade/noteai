<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoterAI</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
</head>
<body>

<!-- Mobile sidebar backdrop -->
<div id="sidebar-backdrop"></div>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div id="sidebar-header">
    <h1>NoterAI</h1>
    <button id="btn-new-note">+ New</button>
  </div>
  <nav id="sidebar-nav">
    <div id="btn-tasks" class="nav-item">☑ Next Tasks</div>
    <div class="nav-section-title" style="margin-top:4px">Folders</div>
    <div id="folder-list">
      <div class="nav-item active" data-folder="">All notes</div>
    </div>
    <div class="nav-section-title" style="margin-top:8px">Tags</div>
    <div id="tag-list"></div>
    <div class="nav-section-title" style="margin-top:8px"></div>
    <div id="btn-settings" class="nav-item">⚙ Settings</div>
  </nav>
  <div id="sidebar-footer">
    <button id="reindex-all-btn">Reindex all notes</button>
    <div id="reindex-progress" style="display:none"></div>
    <div id="build-number"></div>
  </div>
</aside>

<!-- ── Main ── -->
<main id="main">

  <!-- Tasks panel -->
  <div id="tasks-panel" style="display:none">
    <div id="tasks-toolbar">
      <button class="btn-hamburger" aria-label="Open menu">☰</button>
      <span id="tasks-title">☑ Next Tasks</span>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- Note list panel -->
  <div id="note-list-panel">
    <div id="search-bar">
      <button class="btn-hamburger" aria-label="Open menu">☰</button>
      <input id="search-input" type="search" placeholder="Semantic search…" autocomplete="off" />
      <button id="btn-dictate" title="Dictate journal entry">🎤</button>
      <button id="btn-refresh" title="Refresh note list">↻</button>
    </div>
    <div id="dictate-status" style="display:none"></div>
    <div id="note-list">
      <div class="empty-state">No notes yet. Create one!</div>
    </div>
  </div>

  <!-- Editor panel (hidden until a note is selected) -->
  <div id="editor-panel" style="display:none">
    <div id="editor-toolbar">
      <button class="btn-hamburger" aria-label="Open menu">☰</button>
      <button id="btn-home" title="Back to notes">⌂</button>
      <input id="note-title-input" type="text" placeholder="Untitled" />
      <span id="save-badge" class="badge" style="display:none"></span>
      <button id="btn-edit-toggle" title="Toggle edit/preview">Edit</button>
      <button id="btn-reindex" title="Re-index this note">↻ Reindex</button>
      <button id="btn-archive" title="Move to Archive">Archive</button>
      <button id="btn-delete" title="Delete note">Delete</button>
      <button id="btn-save">Save</button>
    </div>
    <div id="editor-meta">
      <div class="meta-field">
        <label>Folder</label>
        <select id="folder-input">
          <option value="Unfiled">Unfiled</option>
          <option value="Reference">Reference</option>
          <option value="Ideas">Ideas</option>
          <option value="Todo">Todo</option>
          <option value="Review Later">Review Later</option>
          <option value="Projects">Projects</option>
          <option value="Journal">Journal</option>
          <option value="Resources">Resources</option>
          <option value="Archive">Archive</option>
        </select>
      </div>
      <div class="meta-field">
        <label>Reminder</label>
        <input type="date" id="reminder-input" />
        <button id="btn-reminder-done" style="display:none">✓ Done</button>
      </div>
      <div class="meta-field">
        <label>Tags</label>
        <div id="tags-container">
          <div id="tag-chips"></div>
          <input id="tag-input" type="text" placeholder="add tag, press Enter" />
        </div>
      </div>
    </div>
    <div id="note-summary-section" style="display:none"></div>
    <div id="attachments-section">
      <div id="drop-zone">
        Drop a PDF here or <u>click to choose</u>
        <input type="file" id="file-input" accept="application/pdf" />
      </div>
      <div id="attachment-list"></div>
    </div>
    <div id="video-embed" style="display:none">
      <div class="video-embed-wrap">
        <iframe id="video-iframe" frameborder="0" allowfullscreen
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
        </iframe>
      </div>
    </div>
    <div id="note-preview"></div>
    <textarea id="note-content" placeholder="Write in markdown…"></textarea>
  </div>

  <!-- Settings view -->
  <div id="settings-view" style="display:none">
    <div id="settings-toolbar">
      <button class="btn-hamburger" aria-label="Open menu">☰</button>
      <span>Settings</span>
    </div>
    <div id="settings-body">
      <section class="settings-section">
        <h2>Telegram Reminders</h2>
        <p class="settings-hint">Times the bot sends a daily task reminder (server local time).</p>
        <div id="reminder-times-list"></div>
        <button id="btn-add-reminder-time" class="btn-add-time">+ Add time</button>
      </section>
      <div class="settings-actions">
        <button id="btn-settings-save">Save Settings</button>
      </div>
    </div>
  </div>

</main>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service_worker.js');
  }
</script>
</body>
</html>
